<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #110e1c; --sidebar-bg: #1a162b; --player-bg: #211d35; --primary: #c44afb; --text-main: #ffffff; --text-muted: #a09dae; --card-blue: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); --card-red: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); --card-purple: linear-gradient(135deg, #b224ef 0%, #7579ff 100%); --card-orange: linear-gradient(135deg, #f6d365 0%, #fda085 100%); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; height: 100vh; }
        
        /* TOAST & OVERLAYS */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #a254f2, #ff7eb3); color: white; padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 99999; opacity: 0; visibility: hidden; transition: var(--transition); }
        #toast.show { opacity: 1; visibility: visible; top: 40px; }
        
        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 14, 28, 0.98); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(15px); }
        .ad-overlay.active { opacity: 1; visibility: visible; }
        .ad-content { text-align: center; color: white; padding: 30px; }
        .ad-icon { font-size: 60px; color: #f6d365; margin-bottom: 25px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .ad-timer { font-size: 20px; font-weight: bold; margin-top: 20px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; display: inline-block; }
        .ad-timer span { color: var(--primary); font-size: 24px; margin: 0 5px; }
        
        #shareModal, #createPlaylistModal, #addToPlaylistModal { z-index: 25000; }
        #lyricCardToCapture { width: 320px; height: 320px; background: linear-gradient(135deg, #ce6857, #a25243); border-radius: 15px; padding: 25px; display: flex; flex-direction: column; text-align: left; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* LYRICS */
        .lyrics-overlay { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(162, 84, 242, 0.95), rgba(17, 14, 28, 0.98)); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 20000; transition: top 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; padding: 40px 20px 20px 20px; }
        .lyrics-overlay.active { top: 0; }
        .lyrics-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .lyrics-title { font-size: 24px; font-weight: 800; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .lyrics-content { flex: 1; overflow-y: auto; text-align: center; font-size: 26px; font-weight: 700; line-height: 1.5; color: rgba(255,255,255,0.9); scroll-behavior: smooth; padding-bottom: 20px; }
        .lyrics-content::-webkit-scrollbar { display: none; }
        .lyric-line { transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); opacity: 0.3; transform: scale(0.9); margin: 25px 0; cursor: pointer; filter: blur(1px); }
        .lyric-line:hover { opacity: 0.7; }
        .lyric-line.active { opacity: 1; transform: scale(1.15); filter: blur(0px); color: #ffffff; text-shadow: 0 0 25px rgba(196, 74, 251, 0.9); }

        /* SIDEBAR & HEADER */
        .sidebar { width: 240px; background-color: var(--sidebar-bg); padding: 20px; display: flex; flex-direction: column; gap: 30px; border-right: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; cursor: pointer; }
        .logo-icon { display: flex; justify-content: center; align-items: center; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-link { display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 12px 15px; border-radius: 10px; transition: var(--transition); cursor: pointer; }
        .nav-link:hover, .nav-link.active { background-color: rgba(196, 74, 251, 0.1); color: var(--text-main); }
        .nav-link.active i { color: var(--primary); }
        .nav-link i { font-size: 18px; width: 20px; text-align: center; }
        .sidebar-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0; }
        
        .mobile-header { display: none; align-items: center; gap: 12px; padding: 20px 20px 10px 20px; background-color: var(--bg-color); position: sticky; top: 0; z-index: 50; }
        .mobile-header h1 { font-size: 22px; font-weight: 700; }
        
        /* VIEWS & CONTENT */
        .main-content { flex: 1; overflow-y: auto; position: relative; display: block; }
        .view-section { display: none; padding: 20px 30px 140px 30px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { font-size: 20px; font-weight: 600; margin: 20px 0 15px 0; display: flex; align-items: center; gap: 8px; }
        
        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { border-radius: 15px; padding: 20px; height: 130px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card.blue { background: var(--card-blue); } .card.red { background: var(--card-red); }
        .card.purple { background: var(--card-purple); } .card.orange { background: var(--card-orange); }
        .card h3 { font-size: 16px; font-weight: 600; z-index: 1; margin-top: auto; }
        .card i { font-size: 30px; margin-bottom: 10px; z-index: 1; }
        
        /* SEARCH & LISTS */
        .search-container { position: relative; margin-bottom: 30px; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 15px 45px 15px 50px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 16px; outline: none; transition: var(--transition); }
        .search-input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 0 2px var(--primary); }
        .search-icon { position: absolute; left: 20px; color: var(--text-muted); font-size: 18px; }
        .search-spinner { position: absolute; right: 20px; color: var(--primary); font-size: 18px; display: none; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-box { height: 90px; border-radius: 12px; padding: 15px; font-weight: 600; position: relative; overflow: hidden; cursor: pointer; }
        .cat-box span { position: relative; z-index: 2; }
        .cat-box i { position: absolute; right: -10px; bottom: -10px; font-size: 50px; opacity: 0.3; transform: rotate(15deg); }
        
        .song-list { display: flex; flex-direction: column; gap: 10px; }
        .song-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.03); cursor: pointer; transition: var(--transition); }
        .song-item:hover { background: rgba(255,255,255,0.08); }
        .song-item-left { display: flex; align-items: center; gap: 15px; }
        .song-cover { width: 45px; height: 45px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: white; overflow: hidden; }
        .song-cover img { width: 100%; height: 100%; object-fit: cover; }
        .song-info h4 { font-size: 15px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .song-info p { font-size: 12px; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* TOMBOL ACTION DI MENU LIBRARY (DESKTOP & MOBILE) */
        .library-action-btn { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: var(--transition); }
        .library-action-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .library-action-btn .icon-box { background: linear-gradient(135deg, #a254f2, #ff7eb3); width: 45px; height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: white; }

        /* FORMS */
        .btn-large { background: linear-gradient(135deg, #a254f2, #ff7eb3); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: var(--transition); width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-large:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(162, 84, 242, 0.4); }
        .auth-form { display: flex; flex-direction: column; gap: 15px; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .auth-input { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; transition: all 0.3s; }
        .auth-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .auth-toggle { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 5px; cursor: pointer; }
        .auth-toggle span { color: var(--primary); font-weight: 600; text-decoration: underline; }

        /* PLAYLIST DETAIL */
        .playlist-detail-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 30px; position: relative; }
        .pd-cover { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pd-info { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 180px; }
        .pd-title { font-size: 32px; font-weight: 800; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pd-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; }
        .pd-actions { display: flex; align-items: center; gap: 15px; }

        /* PLAYERS & PROGRESS */
        .progress-container { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px; font-size: 12px; color: var(--text-muted); }
        .progress-bar { flex: 1; height: 6px; background-color: rgba(255,255,255,0.15); border-radius: 5px; cursor: pointer; position: relative; touch-action: none; user-select: none; -webkit-user-select: none; }
        .progress-bar::before { content: ''; position: absolute; top: -10px; bottom: -10px; left: 0; right: 0; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background-color: var(--primary); border-radius: 5px; pointer-events: none; }
        .progress-fill::after { content: ''; position: absolute; right: -7px; top: -4px; width: 14px; height: 14px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5); transition: transform 0.1s; pointer-events: none; }
        .progress-bar:hover .progress-fill::after { transform: scale(1.3); }

        .bottom-player { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background-color: var(--player-bg); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; transition: var(--transition); }
        .player-left { display: flex; align-items: center; gap: 15px; width: 30%; cursor: pointer; }
        .player-info-wrapper { display: flex; align-items: center; gap: 15px; }
        .album-art { width: 55px; height: 55px; background-color: #383152; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #a09dae; transition: var(--transition); overflow: hidden; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .track-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .track-info p { font-size: 12px; color: var(--text-muted); }
        .like-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; transition: var(--transition); }
        .like-btn.active { color: #ff0844; }

        .player-center { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px; }
        .controls-main { display: flex; align-items: center; gap: 20px; }
        .controls-main button { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; transition: var(--transition); }
        .controls-main button:hover { color: white; }
        .controls-main .play-btn { width: 40px; height: 40px; background: white; color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; transition: transform 0.2s; }
        
        .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 15px; width: 30%; }
        .action-btn { background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        .mobile-bottom-nav { display: none; }
        .mobile-full-player { display: none; }

        /* ================= MEDIA QUERIES (MOBILE VIEW) ================= */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .view-section { padding: 15px 20px 160px 20px; }
            .playlist-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { height: 100px; padding: 15px; }
            .card i { font-size: 24px; } .card h3 { font-size: 13px; }
            
            .playlist-detail-header { flex-direction: column; align-items: center; text-align: center; gap: 15px; margin-top: 20px; }
            .pd-info { height: auto; align-items: center; }
            .pd-cover { width: 160px; height: 160px; }

            .bottom-player { bottom: 70px; left: 10px; width: calc(100% - 20px); height: 60px; border-radius: 12px; padding: 0 15px; background: #211d35; box-shadow: 0 4px 15px rgba(0,0,0,0.5); justify-content: space-between; }
            .player-left { width: auto; flex: 1; justify-content: space-between; padding-right: 15px; }
            .player-info-wrapper { gap: 10px; }
            .album-art { width: 40px; height: 40px; font-size: 18px; }
            .track-info h4 { font-size: 13px; max-width: 100px; }
            .track-info p { font-size: 11px; }
            .like-btn { display: block; font-size: 20px; padding: 5px; }

            .player-center { width: auto; align-items: flex-end; }
            .progress-container, .controls-main button:not(.play-btn) { display: none; }
            .controls-main .play-btn { width: 35px; height: 35px; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
            .player-right { display: none; }

            .mobile-bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-color); justify-content: space-between; padding: 10px 15px 15px 15px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
            .mobile-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; gap: 4px; text-decoration: none; transition: var(--transition); flex: 1; }
            .mobile-nav-item.active { color: var(--primary); }
            .mobile-nav-item i { font-size: 18px; }

            .mobile-full-player { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #2b1b42, var(--bg-color)); z-index: 1000; flex-direction: column; padding: 20px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
            .mobile-full-player.active { transform: translateY(0); }
            .fp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; margin-top: 10px; }
            .fp-album { width: 100%; aspect-ratio: 1/1; background-color: #383152; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: center; align-items: center; font-size: 80px; color: #554d73; box-shadow: 0 10px 30px rgba(0,0,0,0.4); overflow: hidden; }
            .fp-album img { width: 100%; height: 100%; object-fit: cover; }
            .fp-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
            .fp-info h2 { font-size: 22px; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .fp-info p { color: var(--text-muted); font-size: 15px; }
            .fp-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
            .fp-controls button { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
            .fp-controls .fp-play { width: 65px; height: 65px; background: linear-gradient(135deg, #a254f2, #ff7eb3); border-radius: 50%; font-size: 24px; box-shadow: 0 5px 15px rgba(162, 84, 242, 0.4); display: flex; justify-content: center; align-items: center; }
            .fp-actions { display: flex; justify-content: space-evenly; margin-top: auto; padding-bottom: 20px;}
            .fp-actions button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 20px; border-radius: 20px; font-size: 14px; display: flex; gap: 8px; align-items: center; cursor: pointer; }

            .lyrics-content { font-size: 20px; line-height: 1.6; }
            .lyric-line { margin: 18px 0; }
            .lyric-line.active { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="ytplayer" style="position: absolute; top: -9999px; left: -9999px; width: 0; height: 0; visibility: hidden;"></div>
    <div id="toast">Aksi Berhasil!</div>

    <div class="ad-overlay" id="adOverlay">
        <div class="ad-content" style="width: 100%; max-width: 500px;">
            <h2 style="font-size: 22px;
